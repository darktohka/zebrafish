# Default configuration for zebrafish-dns
# DNS over HTTPS proxy server

[server]
# Address to listen on for DNS queries
listen_address = "0.0.0.0"
listen_port = 53

# Also listen on IPv6
listen_address_v6 = "::"

# Number of worker threads (0 = auto-detect based on CPU count)
workers = 0

[upstream]
# DNS over HTTPS provider
# Supported: "cloudflare", "google", "quad9", "custom"
provider = "cloudflare"

# Custom DoH URL (only used when provider = "custom")
# custom_url = "https://your-doh-server/dns-query"

[upstream.providers.cloudflare]
url = "https://cloudflare-dns.com/dns-query"
bootstrap = ["1.1.1.1", "1.0.0.1", "2606:4700:4700::1111", "2606:4700:4700::1001"]

[upstream.providers.google]
url = "https://dns.google/dns-query"
bootstrap = ["8.8.8.8", "8.8.4.4", "2001:4860:4860::8888", "2001:4860:4860::8844"]

[upstream.providers.quad9]
url = "https://dns.quad9.net/dns-query"
bootstrap = ["9.9.9.9", "149.112.112.112", "2620:fe::fe", "2620:fe::9"]

[cache]
# Maximum number of cached DNS entries
max_entries = 10000

# Minimum TTL to cache (seconds) - overrides upstream if lower
min_ttl = 60

# Maximum TTL to cache (seconds) - overrides upstream if higher
max_ttl = 86400

[logging]
# Log level: "error", "warn", "info", "debug", "trace"
level = "info"
